<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EyeZen</title>
    <style>
        :root { --bg-primary: #0a0a0f; --accent-mint: #00d4aa; --accent-purple: #7c3aed; --text-primary: #e5e5e5; --text-secondary: #9ca3af; --border-glass: rgba(255, 255, 255, 0.1); }
        body { font-family: sans-serif; background: var(--bg-primary); color: var(--text-primary); padding: 40px 20px; display: flex; align-items: center; min-height: 80vh; flex-direction: column; }
        .glass-card { background: rgba(6, 182, 212, 0.08); backdrop-filter: blur(20px); border: 1px solid var(--border-glass); border-radius: 24px; padding: 40px; max-width: 500px; text-align: center; }
        h1 { background: linear-gradient(135deg, var(--accent-mint), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .email-box { margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid var(--border-glass); font-size: 1.2rem; color: var(--accent-mint); }
        .back-btn { margin-top: 30px; padding: 12px 24px; border: 1px solid var(--accent-mint); border-radius: 8px; color: var(--accent-mint); text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Get in Touch</h1>
        <p>Have a question or a bug to report? We'd love to hear from you!</p>
        
        <div class="email-box">
            eyezen.timer@gmail.com
        </div>

        <p style="margin-top: 20px; color: var(--text-secondary); font-size: 0.9rem;">We aim to respond to all inquiries within 48 hours.</p>

        <a href="index.html" class="back-btn">← Back to Home</a>
    </div>
</body>
</html>
